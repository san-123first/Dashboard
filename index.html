<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Agro-Intelligence</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #334155; position: relative; }
        .value { font-size: 2.2em; font-weight: bold; color: #10b981; }
        .charts-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; }
        .chart-box { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; position: relative; }
        h3 { color: #38bdf8; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        
        /* Style du bouton Pompe */
        .pump-btn {
            padding: 15px 30px; border-radius: 50px; border: none; font-weight: bold;
            font-size: 1.2rem; cursor: default; transition: 0.3s;
            display: block; margin: 20px auto; width: fit-content;
        }
        .pump-off { background: #334155; color: #94a3b8; border: 2px solid #475569; }
        .pump-on { background: #059669; color: white; box-shadow: 0 0 20px #10b981; border: 2px solid #10b981; }
        
        .alert-status { position: absolute; top: 20px; right: 20px; font-weight: bold; font-size: 0.8rem; }
        .buzzer-active { border: 2px solid #ef4444 !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        .soil-value { color: #fbbf24 !important; } /* Couleur différente pour le sol */
    </style>
</head>
<body>

    <h1 style="text-align:center; color:#38bdf8; margin-bottom: 10px;">Système d'Irrigation Intelligent</h1>
    
    <button id="pumpIndicator" class="pump-btn pump-off">POMPE : ARRÊTÉE</button>

    <div class="grid">
        <div class="card"><h3>Température</h3><div class="value" id="temp">--</div><span>°C</span></div>
        <div class="card"><h3>Humidité Air</h3><div class="value" id="air_hum">--</div><span>%</span></div>
        <div class="card"><h3>Humidité Sol</h3><div class="value soil-value" id="soil_hum">--</div><span>%</span></div>
        <div class="card"><h3>Pression</h3><div class="value" id="pres">--</div><span>hPa</span></div>
        <div class="card"><h3>Vitesse Vent</h3><div class="value" id="wind_speed">--</div><span>m/s</span></div>
        <div class="card"><h3>Lumière</h3><div class="value" id="lux">--</div><span>Lux</span></div>
    </div>

    <div class="charts-container">
        <div class="chart-box" id="boxQte">
            <h3>💧 Besoin en Eau (L/m²)</h3>
            <div id="qteStatus" class="alert-status">NORMAL</div>
            <canvas id="chartQte"></canvas>
        </div>
        <div class="chart-box" id="boxTime">
            <h3>⏱️ Durée d'arrosage (Min)</h3>
            <div id="timeStatus" class="alert-status">NORMAL</div>
            <canvas id="chartTime"></canvas>
        </div>
    </div>

    <script>
        const brokerIP = "192.168.167.208"; 
        const client = new Paho.MQTT.Client(brokerIP, 9001, "web_client_" + Math.random());

        // Configuration avec Ligne Rouge de seuil
        const plotConfig = (label, color, threshold) => ({
            type: 'line',
            data: { labels: [], datasets: [{ label: label, data: [], borderColor: color, backgroundColor: color + '22', fill: true, tension: 0.4 }]},
            options: { 
                responsive: true,
                plugins: {
                    annotation: {
                        annotations: {
                            line1: {
                                type: 'line', yMin: threshold, yMax: threshold,
                                borderColor: 'red', borderWidth: 2, borderDash: [6, 6],
                                label: { content: 'SEUIL STRESS', display: true, backgroundColor: 'red', color: 'white' }
                            }
                        }
                    }
                }
            }
        });

        // Seuils : 0.6 L/m2 et 0.5 min (ajustables selon tes tests)
        const chartQte = new Chart(document.getElementById('chartQte'), plotConfig('Litres / m²', '#3b82f6', 0.6));
        const chartTime = new Chart(document.getElementById('chartTime'), plotConfig('Minutes', '#10b981', 0.5));

        client.onMessageArrived = (msg) => {
            const topic = msg.destinationName;
            const val = parseFloat(msg.payloadString);
            const payload = msg.payloadString;

            // Mise à jour des cartes
            if(topic === "sensor/temp")       document.getElementById("temp").innerText = val.toFixed(1);
            if(topic === "sensor/hum_air")    document.getElementById("air_hum").innerText = val.toFixed(1);
            if(topic === "sensor/soil")       document.getElementById("soil_hum").innerText = val.toFixed(0);
            if(topic === "sensor/pression")   document.getElementById("pres").innerText = val.toFixed(1);
            if(topic === "sensor/vent")       document.getElementById("wind_speed").innerText = val.toFixed(1);
            if(topic === "sensor/lumiere")    document.getElementById("lux").innerText = val.toFixed(0);

            // Graphiques KPI
            if(topic === "dashboard/besoin_eau") updateKpiChart(chartQte, val, 0.6, "qteStatus", "boxQte");
            if(topic === "dashboard/duree_min")   updateKpiChart(chartTime, val, 0.5, "timeStatus", "boxTime");

            // État de la Pompe (Bouton)
            if(topic === "pump/status") {
                const btn = document.getElementById("pumpIndicator");
                if(payload === "ON") {
                    btn.innerText = "POMPE : EN COURS D'ARROSAGE";
                    btn.className = "pump-btn pump-on";
                } else {
                    btn.innerText = "POMPE : ARRÊTÉE";
                    btn.className = "pump-btn pump-off";
                }
            }
        };

        function updateKpiChart(chart, val, crit, statusId, boxId) {
            const now = new Date().toLocaleTimeString();
            chart.data.labels.push(now);
            chart.data.datasets[0].data.push(val);
            const statusEl = document.getElementById(statusId);
            const boxEl = document.getElementById(boxId);
            
            if (val >= crit) { 
                statusEl.innerText = "STRESS DÉTECTÉ"; 
                statusEl.style.color = "#ef4444";
                boxEl.classList.add("buzzer-active");
            } else { 
                statusEl.innerText = "NORMAL"; 
                statusEl.style.color = "#10b981"; 
                boxEl.classList.remove("buzzer-active");
            }

            if(chart.data.labels.length > 15) { 
                chart.data.labels.shift(); 
                chart.data.datasets[0].data.shift(); 
            }
            chart.update();
        }

        client.connect({ onSuccess: () => { 
            client.subscribe("sensor/#"); 
            client.subscribe("dashboard/#"); 
            client.subscribe("pump/#");
            console.log("MQTT Connecté !");
        }});
    </script>
</body>
</html>
